crossorigin>

rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<!-- NAVBAR -->

<!-- HERO -->

<section class="hero">

<div class="hero-text">

<h1>

🎌 Genre Anime

</h1>

<p>

Pilih genre untuk melihat daftar anime.

</p>

</div>

</section>

<div class="container">

<div id="genre-list" class="category-list">

</div>

<section class="hasil">

<h2>

Daftar Anime

</h2>

<div id="anime-container">

<div class="loading">

<div class="spinner"></div>

<p>

Mengambil data...

</p>

</div>

</div>

</section>

</div>

<footer>

<div class="footer-content">

<div>

<h3>

AnimeKu

</h3>

<p>

Powered by Jikan API

</p>

</div>

<div>

<h3>

Developer

</h3>

<p>

Deva Yohand Pangestu

</p>

</div>

</div>

<hr>

<p class="copyright">

© 2026 AnimeKu

</p>

</footer>

<script>

const genreContainer=document.getElementById("genre-list");

const animeContainer=document.getElementById("anime-container");

fetch("https://api.jikan.moe/v4/genres/anime")

.then(response=>response.json())

.then(result=>{

let html="";

result.data.forEach(genre=>{

html+=`

<button
onclick="loadGenre(${genre.mal_id})">

${genre.name}

</button>

`;

});

genreContainer.innerHTML=html;

loadGenre(1);

});
// ======================================
// LOAD ANIME BERDASARKAN GENRE
// ======================================

function loadGenre(id){

animeContainer.innerHTML=`

<div class="loading">

<div class="spinner"></div>

<p>

Mengambil data anime...

</p>

</div>

`;

fetch(`https://api.jikan.moe/v4/anime?genres=${id}&limit=24`)

.then(response=>response.json())

.then(result=>{

let html="";

if(result.data.length==0){

animeContainer.innerHTML=`

<div class="error">

<h2>

Anime Tidak Ditemukan

</h2>

<p>

Tidak ada anime pada genre ini.

</p>

</div>

`;

return;

}

result.data.forEach(anime=>{

let synopsis=anime.synopsis ?? "";

if(synopsis.length>150){

synopsis=synopsis.substring(0,150)+"...";

}

html+=`

<div class="anime-card">

<div class="anime-image">

<img
src="${anime.images.jpg.large_image_url}"
alt="${anime.title}">

</div>

<div class="anime-body">

<h2>

${anime.title}

</h2>

<div class="rating">

⭐ ${anime.score ?? "-"}

</div>

<div class="info">

<span>

🎬 ${anime.episodes ?? "-" } Episode

</span>

<span>

📅 ${anime.year ?? "-"}

</span>

</div>

<div class="badge">

<span>

${anime.type ?? "-"}

</span>

<span>

${anime.status ?? "-"}

</span>

</div>

<p>

${synopsis}

</p>

<div class="button-group">

<a

href="detail.html?id=${anime.mal_id}"

class="btn-detail">

<i class="fa-solid fa-circle-info"></i>

Lihat Detail

</a>

<a

href="${anime.url}"

target="_blank"

class="btn-mal">

<i class="fa-solid fa-arrow-up-right-from-square"></i>

MyAnimeList

</a>

</div>

</div>

</div>

`;

});

animeContainer.innerHTML=html;

})

.catch(error=>{

console.log(error);

animeContainer.innerHTML=`

<div class="error">

<h2>

Gagal Mengambil Data

</h2>

<p>

Tidak dapat mengambil data dari Jikan API.

Silakan coba lagi.

</p>

</div>

`;

});

}

</script>

</body>

</html>
